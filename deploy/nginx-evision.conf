# Evision Infoserve — reverse proxy on a DEDICATED port (8080).
# This does NOT touch your existing site on ports 80/443.
# Access the app at:  http://YOUR_VPS_IP:8080/   (admin: /admin/)
#
# Install:
#   sudo cp deploy/nginx-evision.conf /etc/nginx/sites-available/evision.conf
#   sudo ln -s /etc/nginx/sites-available/evision.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Later, to move to a real domain + HTTPS, change `listen 8080;` to `listen 80;`,
# set `server_name yourdomain.com;`, then run certbot.

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    client_max_body_size 10m;

    # Proxy everything to the Python app bound on localhost.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
