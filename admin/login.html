<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Evision Infoserve</title>
<link rel="stylesheet" href="admin.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-logo">E</div>
      <div>
        <strong>Evision Infoserve</strong>
        <span>Admin Console</span>
      </div>
    </div>
    <h1>Sign in</h1>
    <p class="auth-sub">Use your admin email and password to continue.</p>
    <form id="loginForm" novalidate>
      <label>Email</label>
      <input type="email" id="email" placeholder="you@evisioninfoserve.com" autocomplete="username" required>
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      <div class="auth-err" id="err"></div>
      <button type="submit" class="btn-primary" id="submitBtn">Sign in</button>
    </form>
    <a class="auth-back" href="../index.html">← Back to website</a>
  </div>
  <script src="admin.js"></script>
  <script>
    // If already logged in, skip straight to dashboard.
    if (Admin.token()) location.replace("index.html");

    const form = document.getElementById("loginForm");
    const err = document.getElementById("err");
    const btn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.textContent = "";
      btn.disabled = true; btn.textContent = "Signing in…";
      try {
        const res = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Login failed");
        Admin.setToken(data.token, data.email);
        location.replace("index.html");
      } catch (ex) {
        err.textContent = ex.message;
        btn.disabled = false; btn.textContent = "Sign in";
      }
    });
  </script>
</body>
</html>
