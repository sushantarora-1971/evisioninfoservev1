<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Evision Infoserve Admin</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
<aside class="sidebar">
  <div class="side-brand">
    <div class="auth-logo sm">E</div>
    <div><strong>Evision</strong><span>Admin</span></div>
  </div>
  <nav class="side-nav">
    <button class="nav-item active" data-view="dashboard">Dashboard</button>
    <button class="nav-item" data-view="enquiries">Enquiries <span class="badge" id="navNew"></span></button>
    <button class="nav-item" data-view="clients">Clients</button>
    <button class="nav-item" data-view="settings">Settings</button>
  </nav>
  <div class="side-foot">
    <span id="whoami" class="whoami"></span>
    <button id="logoutBtn" class="link-btn">Log out</button>
  </div>
</aside>

<main class="main">
  <!-- ░ DASHBOARD ░ -->
  <section class="view" id="view-dashboard">
    <header class="topbar"><h1>Dashboard</h1></header>
    <div class="stat-grid">
      <div class="stat"><span class="stat-k">Total enquiries</span><b id="sEnq">—</b></div>
      <div class="stat"><span class="stat-k">New / unread</span><b id="sNew" class="accent">—</b></div>
      <div class="stat"><span class="stat-k">Clients</span><b id="sCli">—</b></div>
      <div class="stat"><span class="stat-k">Active clients</span><b id="sAct" class="green">—</b></div>
    </div>
    <h2 class="sec-title">Latest enquiries</h2>
    <div class="card"><div id="recentWrap"></div></div>
  </section>

  <!-- ░ ENQUIRIES ░ -->
  <section class="view hidden" id="view-enquiries">
    <header class="topbar">
      <h1>Enquiries</h1>
      <div class="filters">
        <input type="search" id="enqSearch" placeholder="Search name, email, company…">
        <select id="enqType"><option value="">All types</option><option value="quote">Quote</option><option value="audit">Free audit</option></select>
        <select id="enqStatus"><option value="">All statuses</option><option value="new">New</option><option value="contacted">Contacted</option><option value="converted">Converted</option><option value="closed">Closed</option></select>
      </div>
    </header>
    <div class="card"><div id="enqWrap"></div></div>
  </section>

  <!-- ░ CLIENTS ░ -->
  <section class="view hidden" id="view-clients">
    <header class="topbar">
      <h1>Clients</h1>
      <div class="filters">
        <input type="search" id="cliSearch" placeholder="Search clients…">
        <button class="btn-primary sm" id="addClientBtn">+ Add client</button>
      </div>
    </header>
    <div class="card"><div id="cliWrap"></div></div>
  </section>

  <!-- ░ SETTINGS ░ -->
  <section class="view hidden" id="view-settings">
    <header class="topbar"><h1>Settings</h1></header>
    <div class="card narrow">
      <h2 class="sec-title" style="margin-top:0">Change password</h2>
      <form id="pwForm">
        <label>Current password</label>
        <input type="password" id="pwCurrent" required>
        <label>New password (min 8 chars)</label>
        <input type="password" id="pwNew" required>
        <div class="auth-err" id="pwMsg"></div>
        <button type="submit" class="btn-primary">Update password</button>
      </form>
    </div>
  </section>
</main>

<!-- ░ Drawer (enquiry / client detail) ░ -->
<div class="drawer-overlay hidden" id="overlay"></div>
<aside class="drawer hidden" id="drawer">
  <button class="drawer-close" id="drawerClose">×</button>
  <div id="drawerBody"></div>
</aside>

<!-- ░ Toast ░ -->
<div class="toast hidden" id="toast"></div>

<script src="admin.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
